<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Red Squadron Armory</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-page" data-page="admin">
  <aside class="sidebar">
    <a class="sidebar-brand" href="dashboard.html">
      <img src="assets/logo.png" alt="Red Squadron logo" />
      <span>Red Squadron<br><small>Armory System</small></span>
    </a>
    <nav id="sidebarNav"></nav>
    <button class="signout-btn" id="signOutBtn" type="button">Sign Out</button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Command Access</p>
        <h1>Admin Panel</h1>
      </div>
      <a class="topbar-btn" href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="dashboard-intro">
      <div>
        <h2>Centralized Armory Management</h2>
        <p>Add, update, or remove Supabase-based uniforms, weapons/arsenal, and utilities without increasing the website ZIP size. Non-admin users will not see this panel.</p>
      </div>
    </section>

    <section class="content-panel" id="adminToolsPanel"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/page-init.js"></script>
</body>
</html>
