<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Red Squadron Armory</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-page" data-page="dashboard">
  <aside class="sidebar">
    <a class="sidebar-brand" href="dashboard.html">
      <img src="assets/logo.png" alt="Red Squadron logo" />
      <span>Red Squadron<br><small>Armory System</small></span>
    </a>
    <nav id="sidebarNav"></nav>
    <button class="signout-btn" id="signOutBtn" type="button">Sign Out</button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Centralized Armory Dashboard</p>
        <h1>Armory Directory</h1>
      </div>
    </header>

    <section class="dashboard-intro">
      <div>
        <h2>Red Squadron Armory System</h2>
        <p>Select an armory category to review authorized uniforms, armaments, and mission utilities. Branch and certification panels are prepared for future Discord role-based access.</p>
      </div>
    </section>

    <section class="armory-grid" id="armoryGrid" aria-label="Armory categories"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/page-init.js"></script>
</body>
</html>
