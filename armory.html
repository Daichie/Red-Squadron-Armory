<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Armory | Red Squadron</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-page" data-page="armory">
  <aside class="sidebar">
    <a class="sidebar-brand" href="dashboard.html">
      <img src="assets/logo.png" alt="Red Squadron logo" />
      <span>Red Squadron<br><small>Armory System</small></span>
    </a>
    <nav id="sidebarNav"></nav>
    <button class="signout-btn" id="signOutBtn" type="button">Sign Out</button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="unitKicker">Armory Section</p>
        <h1 id="unitTitle">Loading...</h1>
      </div>
      <a class="topbar-btn" href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="unit-hero" id="unitHero"></section>

    <section class="section-tabs" aria-label="Armory content tabs">
      <button class="tab-btn active" data-tab="uniforms" type="button">Uniforms</button>
      <button class="tab-btn" data-tab="weapons" type="button">Weapons / Armaments</button>
      <button class="tab-btn" data-tab="utilities" type="button">Utilities</button>
    </section>

    <section class="content-panel" id="contentPanel"></section>
  </main>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <button class="modal-close" id="modalClose" type="button" aria-label="Close image preview">×</button>
    <img id="modalImage" src="" alt="Expanded preview" />
    <p id="modalCaption"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/page-init.js"></script>
</body>
</html>
