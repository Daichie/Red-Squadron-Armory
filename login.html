<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Access | Red Squadron Armory</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page" data-page="login">
  <main class="login-screen modern-entry">
    <div class="login-dim"></div>
    <section class="login-center" aria-label="Discord login panel">
      <img class="login-logo" src="assets/logo.png" alt="Red Squadron logo" />
      <p class="login-kicker">Secure Discord Access</p>
      <h1>RED SQUADRON ARMORY</h1>
      <button class="discord-btn login-action" id="discordLoginBtn" type="button">
        <img src="assets/discord.svg" alt="" />
        Sign in with Discord
      </button>
      <p class="access-note">You must be a member of the Red Squadron Discord server to access the armory.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/page-init.js"></script>
</body>
</html>
