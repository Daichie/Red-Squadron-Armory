  <link rel="stylesheet" href="css/styles.css" />

<body class="login-page" data-page="callback">

      <h1>VERIFYING ACCESS</h1>
      <p class="access-note" id="callbackStatus">Verifying Discord access...</p>
      <a class="topbar-btn callback-return" href="login.html">Return to Login</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <script src="js/page-init.js"></script>
